# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
# Paths are relative to the repository root (leading slash).
# Canonical blog source for automation + CMS is /content/posts.

backend:
  name: github
  # Matches current origin: https://github.com/leadmakerAgency/trivion-protection
  # Recommended: set SVELTIA_GITHUB_REPO in environment so prebuild injects this dynamically.
  repo: leadmakerAgency/trivion-protection
  # For OAuth (recommended for non-technical editors), deploy https://github.com/sveltia/sveltia-cms-auth
  # and set base_url to your worker URL:
  # base_url: https://your-worker.your-subdomain.workers.dev

# Thumbnails / uploads: same folder as Next.js blog (copied to public/media on prebuild).
media_folder: /content/media
public_folder: /media

output:
  omit_empty_optional_fields: true

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    create: true
    slug: "{{fields.slug}}"
    extension: md
    format: frontmatter
    fields:
      - {
          label: Title,
          name: title,
          widget: string,
          required: true,
        }
      - {
          label: Slug,
          name: slug,
          widget: string,
          required: true,
          hint: "URL-friendly slug, e.g. airbnb-cleaning-cambridge",
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$",
        }
      - {
          label: Publish Date,
          name: date,
          widget: datetime,
          required: true,
          default: "{{now}}",
          picker_utc: true,
          hint: "UTC datetime. Future dates are hidden in production until a scheduled rebuild runs after this instant.",
        }
      - {
          label: Excerpt,
          name: excerpt,
          widget: text,
          required: true,
          hint: "Short summary shown on the blog list and in SEO.",
        }
      - {
          label: Featured Image,
          name: featured_image,
          widget: image,
          required: false,
          hint: "Optional thumbnail image shown on the blog list.",
        }
      - {
          label: Hero Emoji,
          name: hero_emoji,
          widget: string,
          required: false,
          maxlength: 16,
          hint: "Optional emoji used in the blog card thumbnail.",
        }
      - {
          label: Tags,
          name: tags,
          widget: list,
          required: false,
          hint: "One tag per line (simple list).",
        }
      - {
          label: Draft,
          name: draft,
          widget: boolean,
          default: false,
          required: false,
          hint: "When enabled, this post stays hidden in production until Draft is turned off.",
        }
      - {
          label: Body,
          name: body,
          widget: markdown,
          required: true,
        }

# Deploy static Next.js export (folder `out/`) to Bluehost over SSH/rsync.
#
# --- Prerequisites (manual) ---
# 1. In Bluehost cPanel: enable SSH (“Manage Shell” / SSH Access). Note hostname, SSH username,
#    port (often 22), and your home directory.
# 2. Create an SSH key pair for deployment. Authorize the *public* key in cPanel SSH key manager.
# 3. Decide REMOTE_PATH: absolute path to the directory that should receive the site, e.g.
#    `/home/username/public_html` or a subdomain docroot such as `/home/username/public_html/staging`.
#    ⚠ ARGS includes `--delete`: rsync will remove files under REMOTE_PATH that are not in `out/`.
#    Only use --delete against a folder dedicated to this site, or edit ARGS to drop `--delete`.
#
# --- GitHub repository configuration ---
# Secrets (Settings → Secrets and variables → Actions → Secrets):
#   SSH_PRIVATE_KEY   Full private key (PEM/OpenSSH), multiline.
#   SSH_PASSPHRASE    Passphrase if the key has one; omit or leave empty if none.
#   SSH_HOST          Server hostname or IP (e.g. domain or boxNNN.bluehost.com).
#   SSH_USERNAME      SSH/cPanel username.
#   SSH_PORT          SSH port as a string (e.g. `22`).
#   REMOTE_PATH       Absolute target path on the server (same as TARGET below).
#
# Variables (same settings page → Variables — not secret):
#   NEXT_PUBLIC_SITE_URL   Canonical public URL with no trailing slash, e.g. https://yourdomain.com
#                          Used for sitemap, JSON-LD, and llms*.txt URLs at build time.
# Optional Variables for contact/metadata:
#   NEXT_PUBLIC_CONTACT_EMAIL, NEXT_PUBLIC_CONTACT_PHONE, NEXT_PUBLIC_ORG_* (see src/lib/site.ts).
#
name: Deploy to Bluehost via SSH

on:
  push:
    branches:
      - main # rename if your default branch is different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@v5.0.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: out/
          TARGET: ${{ secrets.REMOTE_PATH }}
          ARGS: -avzr --delete

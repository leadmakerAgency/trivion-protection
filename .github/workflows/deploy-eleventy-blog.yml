# Builds eleventy-blog/ and publishes _site to GitHub Pages.
# Repository Settings → Pages → Source: GitHub Actions.
# Repository Settings → Actions → General → Workflow permissions: Read and write (if needed for Pages).

name: Deploy Eleventy blog to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "eleventy-blog/**"
      - ".github/workflows/deploy-eleventy-blog.yml"
  # Rebuild periodically so posts whose Publish date has passed appear without a manual push (GitHub cron resolution: ~hourly).
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-eleventy-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: eleventy-blog/package-lock.json

      - name: Install and build
        working-directory: eleventy-blog
        env:
          # GitHub Pages project URL: https://<user>.github.io/<repo>/
          # For a user/org site at the domain root (repo named <user>.github.io), set ELEVENTY_PATH_PREFIX empty and set ELEVENTY_SITE_URL to your public origin if needed.
          ELEVENTY_PATH_PREFIX: ${{ github.event.repository.name }}
          # RSS absolute links: Pages hostname only; Eleventy pathPrefix adds /<repo>/ to paths.
          ELEVENTY_SITE_URL: https://${{ github.repository_owner }}.github.io
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: eleventy-blog/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
